name: Frontend CI

on:
  pull_request:
    paths:
      - 'apps/web/**'
      - 'package.json'
      - 'pnpm-lock.yaml'
      - 'pnpm-workspace.yaml'
      - '.github/workflows/frontend-ci.yml'

  push:
    branches:
      - main
    paths:
      - 'apps/web/**'
      - 'package.json'
      - 'pnpm-lock.yaml'
      - 'pnpm-workspace.yaml'
      - '.github/workflows/frontend-ci.yml'

permissions:
  contents: read

concurrency:
  group: frontend-ci-${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  frontend-quality:
    name: Frontend Quality
    runs-on: ubuntu-latest
    timeout-minutes: 20

    env:
      NEXT_PUBLIC_API_BASE_URL: http://127.0.0.1:8080

    steps:
      - name: Checkout repository
        uses: actions/checkout@v7

      - name: Set up Node.js
        uses: actions/setup-node@v6
        with:
          node-version: '24.9.0'

      - name: Enable Corepack
        run: corepack enable

      - name: Verify pnpm version
        run: |
          test "$(corepack pnpm --version)" = "11.8.0"

      - name: Install dependencies
        run: corepack pnpm install --frozen-lockfile

      - name: Run ESLint
        run: corepack pnpm --filter web lint

      - name: Run TypeScript validation
        run: corepack pnpm --filter web typecheck

      - name: Build production frontend
        run: corepack pnpm --filter web build
