name: Backend CI

on:
  pull_request:
    paths:
      - 'apps/api/**'
      - 'apps/web/types/**'
      - 'database/**'
      - '.dockerignore'
      - 'compose.yaml'
      - '.github/workflows/backend-ci.yml'
      - 'scripts/**'
      - 'docs/**'
      - 'package.json'
      - 'pnpm-lock.yaml'
      - 'pnpm-workspace.yaml'

  push:
    branches:
      - main
    paths:
      - 'apps/api/**'
      - 'apps/web/types/**'
      - 'database/**'
      - '.dockerignore'
      - 'compose.yaml'
      - '.github/workflows/backend-ci.yml'
      - 'scripts/**'
      - 'docs/**'
      - 'package.json'
      - 'pnpm-lock.yaml'
      - 'pnpm-workspace.yaml'

permissions:
  contents: read

concurrency:
  group: backend-ci-${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  backend-quality:
    name: Backend Quality
    runs-on: ubuntu-latest
    timeout-minutes: 20

    defaults:
      run:
        working-directory: apps/api

    steps:
      - name: Checkout repository
        uses: actions/checkout@v7

      - name: Set up Go
        uses: actions/setup-go@v6
        with:
          go-version-file: apps/api/go.mod
          cache: true
          cache-dependency-path: apps/api/go.sum

      - name: Download dependencies
        run: go mod download

      - name: Verify Go formatting
        shell: bash
        run: |
          unformatted_files="$(gofmt -l .)"

          if [ -n "$unformatted_files" ]; then
            printf '%s\n' "The following Go files are not formatted:"
            printf '%s\n' "$unformatted_files"
            exit 1
          fi

      - name: Run Go tests
        run: go test -count=1 ./...

      - name: Run Go vet
        run: go vet ./...

      - name: Run architecture and contract audit
        run: go run ./tools/projectaudit -mode all -strict

      - name: Run code review policy audit
        run: go run ./tools/codereviewaudit -strict

      - name: Run Stage 14 completion source audit
        run: go run ./tools/stage14finalaudit -strict

      - name: Run pinned Go vulnerability analysis
        run: go run golang.org/x/vuln/cmd/govulncheck@v1.1.4 ./...

  backend-container:
    name: Backend Container
    runs-on: ubuntu-latest
    timeout-minutes: 20
    needs:
      - backend-quality

    steps:
      - name: Checkout repository
        uses: actions/checkout@v7

      - name: Validate Docker Compose configuration
        run: docker compose config > /dev/null

      - name: Build backend container image
        shell: bash
        run: |
          set -euo pipefail

          app_version="ci-${GITHUB_RUN_NUMBER}.${GITHUB_RUN_ATTEMPT}"
          build_date="$(date -u +%Y-%m-%dT%H:%M:%SZ)"

          {
            printf 'GFA_APP_VERSION=%s\n' "$app_version"
            printf 'GFA_VCS_REF=%s\n' "$GITHUB_SHA"
            printf 'GFA_BUILD_DATE=%s\n' "$build_date"
          } >> "$GITHUB_ENV"

          docker build \
            --pull \
            --build-arg APP_VERSION="$app_version" \
            --build-arg VCS_REF="$GITHUB_SHA" \
            --build-arg BUILD_DATE="$build_date" \
            --file apps/api/Dockerfile \
            --tag global-flight-analytics-api:ci \
            .

      - name: Verify non-root runtime user
        shell: bash
        run: |
          runtime_user="$(
            docker image inspect \
              global-flight-analytics-api:ci \
              --format '{{.Config.User}}'
          )"

          if [ "$runtime_user" != "10001:10001" ]; then
            printf '%s\n' "Unexpected runtime user: $runtime_user"
            exit 1
          fi

          image_version="$(
            docker image inspect \
              global-flight-analytics-api:ci \
              --format '{{ index .Config.Labels "org.opencontainers.image.version" }}'
          )"
          image_revision="$(
            docker image inspect \
              global-flight-analytics-api:ci \
              --format '{{ index .Config.Labels "org.opencontainers.image.revision" }}'
          )"
          image_created="$(
            docker image inspect \
              global-flight-analytics-api:ci \
              --format '{{ index .Config.Labels "org.opencontainers.image.created" }}'
          )"

          test "$image_version" = "$GFA_APP_VERSION"
          test "$image_revision" = "$GFA_VCS_REF"
          test "$image_created" = "$GFA_BUILD_DATE"

      - name: Run container health smoke test
        shell: bash
        run: |
          set -euo pipefail

          network_name="gfa-backend-ci-${GITHUB_RUN_ID}-${GITHUB_RUN_ATTEMPT}"
          database_name="gfa-postgres-${GITHUB_RUN_ID}-${GITHUB_RUN_ATTEMPT}"
          database_url="postgres://postgres:postgres@${database_name}:5432/global_flight_analytics_container?sslmode=disable"
          mutation_key_sha256="78fd029a7217aaf71651a747b370be0a76fccebac79bfa02457be3448b636f26"
          container_id=""
          database_id=""

          cleanup() {
            if [ -n "$container_id" ]; then
              docker logs "$container_id" || true
              docker rm --force "$container_id" > /dev/null 2>&1 || true
            fi
            if [ -n "$database_id" ]; then
              docker logs "$database_id" || true
              docker rm --force "$database_id" > /dev/null 2>&1 || true
            fi
            docker network rm "$network_name" > /dev/null 2>&1 || true
          }

          trap cleanup EXIT

          docker network create "$network_name" > /dev/null

          database_id="$(
            docker run \
              --detach \
              --name "$database_name" \
              --network "$network_name" \
              --env POSTGRES_USER=postgres \
              --env POSTGRES_PASSWORD=postgres \
              --env POSTGRES_DB=global_flight_analytics_container \
              postgres:16.14-alpine3.24
          )"

          # The official PostgreSQL image starts a temporary bootstrap server
          # before it creates the requested database and execs the final PID 1
          # postgres process. pg_isready can succeed against that temporary
          # server, so require both the final PID 1 process and SELECT 1 in the
          # requested database before starting migrations.
          bash scripts/wait-for-postgres-container.sh \
            "$database_id" \
            postgres \
            global_flight_analytics_container \
            60 \
            1

          docker run \
            --rm \
            --network "$network_name" \
            --env DATABASE_URL="$database_url" \
            --env DATABASE_CONNECT_TIMEOUT=5s \
            --env MIGRATIONS_DIR=/app/migrations \
            --env MIGRATION_TIMEOUT=2m \
            global-flight-analytics-api:ci \
            /app/migrate

          container_id="$(
            docker run \
              --detach \
              --network "$network_name" \
              --publish 127.0.0.1:18080:8080 \
              --env API_PORT=8080 \
              --env DATABASE_URL="$database_url" \
              --env DATABASE_CONNECT_TIMEOUT=5s \
              --env OPEN_METEO_TIMEOUT=5s \
              --env API_MUTATION_KEY_SHA256="$mutation_key_sha256" \
              global-flight-analytics-api:ci
          )"

          for attempt in $(seq 1 30); do
            health_status="$(
              docker inspect \
                --format '{{.State.Health.Status}}' \
                "$container_id"
            )"

            if [ "$health_status" = "healthy" ]; then
              break
            fi

            if [ "$health_status" = "unhealthy" ]; then
              printf '%s\n' "Container became unhealthy"
              exit 1
            fi

            sleep 1
          done

          final_health_status="$(
            docker inspect \
              --format '{{.State.Health.Status}}' \
              "$container_id"
          )"

          if [ "$final_health_status" != "healthy" ]; then
            printf '%s\n' "Container did not become healthy"
            exit 1
          fi

          curl \
            --fail \
            --silent \
            --show-error \
            http://127.0.0.1:18080/api/v1/health \
            > /dev/null

          curl \
            --fail \
            --silent \
            --show-error \
            http://127.0.0.1:18080/api/v1/ready \
            > /dev/null

          version_payload="$(
            curl \
              --fail \
              --silent \
              --show-error \
              http://127.0.0.1:18080/api/v1/version
          )"

          printf '%s\n' "$version_payload" | jq -e \
            --arg version "$GFA_APP_VERSION" \
            --arg revision "$GFA_VCS_REF" \
            --arg built_at "$GFA_BUILD_DATE" \
            '
              .success == true and
              .data.version == $version and
              .data.revision == $revision and
              .data.built_at == $built_at
            ' \
            > /dev/null

          mutation_status="$(
            curl \
              --silent \
              --output /dev/null \
              --write-out '%{http_code}' \
              --request POST \
              http://127.0.0.1:18080/api/v1/trajectories/00000000-0000-0000-0000-000000000000/route-intelligence
          )"

          if [ "$mutation_status" != "401" ]; then
            printf '%s\n' "Expected unauthorized mutation status 401, got $mutation_status"
            exit 1
          fi

  backend-race:
    name: Backend Race Safety
    runs-on: ubuntu-latest
    timeout-minutes: 40

    defaults:
      run:
        working-directory: apps/api

    steps:
      - name: Checkout repository
        uses: actions/checkout@v7

      - name: Set up Go
        uses: actions/setup-go@v6
        with:
          go-version-file: apps/api/go.mod
          cache: true
          cache-dependency-path: apps/api/go.sum

      - name: Download dependencies
        run: go mod download

      - name: Run critical package race tests
        run: |
          go test -count=1 -race \
            ./cmd/ingest \
            ./cmd/server \
            ./internal/config \
            ./internal/database \
            ./internal/integrations/common \
            ./internal/integrations/airplaneslive \
            ./internal/integrations/openmeteo \
            ./internal/integrations/opensky \
            ./internal/middleware \
            ./internal/orchestration/requestcoalescing \
            ./internal/orchestration/ingestionorchestrator \
            ./internal/orchestration/providerbudget \
            ./internal/orchestration/providerdecision \
            ./internal/orchestration/providerfallback \
            ./internal/orchestration/providerpolicy \
            ./internal/orchestration/providerresponse \
            ./internal/orchestration/regionalprovider \
            ./internal/services/ingestdaemon \
            ./internal/services/providerhealth \
            ./internal/services/reconciliationworker \
            ./internal/services/traffic/application \
            ./internal/services/traffic/ingestion \
            ./internal/services/traffic/processor \
            ./internal/services/traffic/trackbuilder \
            ./internal/services/traffic/trajectoryquality \
            ./internal/services/traffic/validator

      - name: Run analytical core race tests
        run: |
          go test -count=1 -race             ./internal/analytics/...             ./internal/airportintelligence/...             ./internal/airspaceintelligence/...             ./internal/features/...             ./internal/historicalintelligence/...             ./internal/projectionintelligence/...             ./internal/routeintelligence/...             ./internal/stabilityintelligence/...             ./internal/weatherintelligence/...

  postgres-integration:
    name: PostgreSQL 16 Integration
    runs-on: ubuntu-latest
    timeout-minutes: 25

    services:
      postgres:
        image: postgres:16.14-alpine3.24
        env:
          POSTGRES_USER: postgres
          POSTGRES_PASSWORD: postgres
          POSTGRES_DB: global_flight_analytics_test
        ports:
          - 5432:5432
        options: >-
          --health-cmd "pg_isready -U postgres -d global_flight_analytics_test"
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5

    env:
      TEST_DATABASE_URL: postgres://postgres:postgres@localhost:5432/global_flight_analytics_test?sslmode=disable

    defaults:
      run:
        working-directory: apps/api

    steps:
      - name: Checkout repository
        uses: actions/checkout@v7

      - name: Set up Go
        uses: actions/setup-go@v6
        with:
          go-version-file: apps/api/go.mod
          cache: true
          cache-dependency-path: apps/api/go.sum

      - name: Download dependencies
        run: go mod download

      - name: Inspect production migration catalog before apply
        env:
          DATABASE_URL: postgres://postgres:postgres@localhost:5432/global_flight_analytics_test?sslmode=disable
          DATABASE_CONNECT_TIMEOUT: 5s
          MIGRATIONS_DIR: ${{ github.workspace }}/database/migrations
          MIGRATION_TIMEOUT: 2m
        run: go run ./cmd/migrate -status

      - name: Apply and verify production migration catalog
        env:
          DATABASE_URL: postgres://postgres:postgres@localhost:5432/global_flight_analytics_test?sslmode=disable
          DATABASE_CONNECT_TIMEOUT: 10s
          MIGRATIONS_DIR: ${{ github.workspace }}/database/migrations
          MIGRATION_TIMEOUT: 2m
        shell: bash
        run: |
          go run ./cmd/migrate
          go run ./cmd/migrate
          migration_status="$(go run ./cmd/migrate -status)"
          printf '%s\n' "$migration_status"
          if printf '%s\n' "$migration_status" | grep -Eq ' pending$'; then
            printf '%s\n' 'Production migration catalog still contains pending migrations'
            exit 1
          fi

      - name: Run PostgreSQL correctness integration tests
        run: |
          go test -count=1 \
            ./internal/repository/postgres \
            ./internal/features/featurestore \
            ./internal/routeintelligence/routestore \
            ./internal/historicalintelligence/historicalaggregate

# STAGE-14-1-ARCHITECTURE-CONSOLIDATION-V1-1
